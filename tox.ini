[tox]
envlist = py37, py38, py39, py310, py311, py312, py313, py314

[gh-actions]
python =
    3.7: py37
    3.8: py38
    3.9: py39
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314


[testenv:lint]
description = Run Ruff for linting
deps = ruff
commands = ruff check .

[testenv]
deps =
    pytest-cov
    frozendict
    django; python_version >= "3.12"
    phonenumbers
    .
commands = python -m pytest --cov=./loggingredactor

[testenv:flake8]
description = Run Flake8 for indentation and syntax checks
deps = flake8
commands = flake8 .

[flake8]
exclude = 
    .tox,
    .git,
    __pycache__,
    docs*,
    build,
    dist,
    *.pyc,
    *.egg-info,
    .cache,
    .eggs
max-complexity = 10
max-line-length = 120

[ruff]
select = E, F, N, E1, E9
line-length = 120
max-complexity = 10
exclude = 
    .tox,
    .git,
    __pycache__,
    docs*,
    build,
    dist,
    *.pyc,
    *.egg-info,
    .cache,
    .eggs
